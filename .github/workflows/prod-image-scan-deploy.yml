name: Container Scan and Deploy on Production Merge

on:
  push:
    branches: [ production ]

jobs:
  build-scan-deploy:
    name: Build, Scan and Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build image for scanning
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          load: true
          tags: frontend-service:scan
          cache-from: type=gha
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'frontend-service:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Build and push production image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend-service:production
            ghcr.io/${{ github.repository }}/frontend-service:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max